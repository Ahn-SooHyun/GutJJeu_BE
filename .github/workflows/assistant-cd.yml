name: Assistant Service CD
on:
  push:
    branches: ["main"]
    paths:
      - "Assistant/**"
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: Ahn-SooHyun/gutjjeu-assistant
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Inject application.yml
        run: |
          mkdir -p ./Assistant/src/main/resources
          cat << 'EOF' > ./Assistant/src/main/resources/application.yml
          ${{ secrets.YML_ASSISTANT }}
          EOF
      - name: Grant execute permission for gradlew
        run: chmod +x ./Assistant/gradlew
      - name: Build with Gradle
        run: cd Assistant && ./gradlew clean build -x test
      - name: Log in to Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./Assistant
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
