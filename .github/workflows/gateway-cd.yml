name: Gateway Service CD
on:
  release:
    types: [published]
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Inject application.yml
        run: |
          mkdir -p ./Gateway/src/main/resources
          cat << 'EOF' > ./Gateway/src/main/resources/application.yml
          ${{ secrets.YML_GATEWAY }}
          EOF
      - name: Grant execute permission for gradlew
        run: chmod +x ./Gateway/gradlew
      - name: Build with Gradle
        run: cd Gateway && ./gradlew clean build -x test
      - name: Log in to Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./Gateway
          push: true
          tags: ghcr.io/ahn-soohyun/gutjjeu-gateway:${{ github.event.release.tag_name }}
